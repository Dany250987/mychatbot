<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda Personal Inteligente | Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="./src/css/sidebar.css">
  <link rel="stylesheet" href="./src/css/dashboard.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
   <aside id="appSidebar"></aside>

    <!-- Main content -->
    <main class="main">
      <header class="main-header">
        <div class="user-info">
          <img id="user-avatar" class="avatar" src="" alt="Avatar" style="display: none;">
          <h1 id="section-title">Bienvenida 💫</h1>
        </div>
        <div class="date-time" id="datetime"></div>
      </header>

      <section class="cards-overview">
        <div class="card dashboard-card">
          <div class="card-icon tasks-icon">
            <i class="fa-solid fa-list-check"></i>
          </div>

          <div class="card-info">
            <h3>Total de Tareas</h3>
            <p id="totalTasksCount">0</p>
          </div>
        </div>

        <div class="card dashboard-card">
          <div class="card-icon events-icon">
            <i class="fa-solid fa-calendar-check"></i>
          </div>

          <div class="card-info">
            <h3>Eventos Hoy</h3>
            <p id="todayEventsCount">0</p>
          </div>
        </div>

        <div class="card dashboard-card">
          <div class="card-icon reminders-icon">
            <i class="fa-solid fa-bell"></i>
          </div>

          <div class="card-info">
            <h3>Recordatorios Activos</h3>
            <p id="activeRemindersCount">0</p>
          </div>
        </div>

        <div class="card dashboard-card highlight" id="card-energia">
          <div class="card-icon energy-icon">
            <i class="fa-solid fa-bolt"></i>
          </div>

          <div class="card-info">
            <h3>Tu Energía</h3>
            <p>98%</p>
          </div>
        </div>
      </section>

      <section id="section-content" class="section-content">
        <div class="welcome-panel">
          <div class="welcome-text">
            <span class="welcome-badge">Panel principal</span>
            <h2>Organiza tu día con Agenda Personal Inteligente</h2>
            <p>
              Gestiona tus tareas, recordatorios, calendario, gastos y hábitos desde un solo lugar.
            </p>

            <div class="quick-actions">
              <a href="./gastos.html" class="quick-action primary-action">
                <i class="fa-solid fa-wallet"></i>
                Ver gastos
              </a>

              <button type="button" class="quick-action" id="quickTaskButton">
                <i class="fa-solid fa-plus"></i>
                Nueva tarea
              </button>

              <button type="button" class="quick-action" id="quickReminderButton">
                <i class="fa-solid fa-bell"></i>
                Crear recordatorio
              </button>
            </div>
          </div>

          
        </div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="./src/js/sidebar.js"></script>
  <script src="./src/js/dashboard.js"></script>
</body>
</html>
