
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DanyBot | Iniciar sesión</title>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/jwt-decode@3.1.2/build/jwt-decode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="src/css/login_google.css">
  <script src="src/js/script.js" defer></script>
</head>

<body>
  <div id="login-card" class="card">
    <div class="card-header"> 
      <div class="logo-container"><img src="src/img/danybot.png" alt="Logo" ></div>
      <h1>¡Te damos la bienvenida a DanyBot!</h1>
      <p>
        <span class="linea-arriba">Qué bueno verte de nuevo 👋</span>
        <span class="linea-abajo">Ingresa para continuar con tu cuenta</span>
      </p>      
    </div>
    

    <!-- Login de Google -->
    <div id="g_id_onload"
        data-client_id="625571352027-jgsi8eovhcd2b4or9uohaog1f8663d8i.apps.googleusercontent.com"
        data-callback="handleCredentialResponse"
        data-auto_prompt="false">
    </div>

    <div class="g_id_signin"
        data-type="standard"
        data-size="large"
        data-theme="outline"
        data-text="sign_in_with"
        data-shape="rectangular"
        data-logo_alignment="left">
    </div>

    <div class="login-divider">
      <span>o ingresa con tu correo</span>
    </div>

    <form id="login-form" class="form">

      <div>
        <label for="email">Correo electrónico:</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder="Ingresa tu correo electrónico"
          autocomplete="email"
          required
        >
        <label for="password">Contraseña:</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Ingresa tu contraseña"
          autocomplete="current-password"
          required
        >
      </div>
      <button type="submit">Iniciar sesión</button>
    </form>

    <p class="signup-text">
      ¿No tienes una cuenta?
      <a class="register" href="signup.html">Crear cuenta gratis</a>
    </p>
    

    <!-- Contenedor oculto del chatbot -->
    <div id="chat-container">
      <h3 id="user-name" style="margin-top: 10px;"></h3>
      <img id="user-avatar" width="80" style="border-radius: 50%; margin-bottom: 10px;" />
      <!-- <h3 id="user-name"></h3> -->
      <p>✅ Acceso correcto. Aquí se cargará el chatbot...</p>
    </div>
  </div>
 
</body>
</html>
